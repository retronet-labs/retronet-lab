services:
  api:
    build:
      context: https://github.com/retronet-labs/retronet-api.git#main
    ports:
      - "${API_PORT:-8080}:8080"
    command:
      - "-addr"
      - ":8080"
      - "-cors-origin"
      - "http://localhost:${UI_PORT:-18081},http://127.0.0.1:${UI_PORT:-18081}"
    restart: unless-stopped

  ui:
    build:
      context: https://github.com/retronet-labs/retronet-ui.git#main
    ports:
      - "${UI_PORT:-18081}:18081"
    command:
      - "-addr"
      - ":18081"
      - "-api"
      - "http://localhost:${API_PORT:-8080}"
    depends_on:
      - api
    restart: unless-stopped

  # Demo standalone della CPU 4004 (non collegata a api/ui): esegue la
  # calcolatrice di esempio e termina. Attivare con:
  #   docker compose --profile demo-4004 run --rm retronet-4004
  retronet-4004:
    build:
      context: https://github.com/retronet-labs/retronet-4004.git#main
    profiles: ["demo-4004"]
